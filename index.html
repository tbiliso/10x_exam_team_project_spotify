<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header></header>
    <main></main>
    <footer class="main-footer">
        <div class="music-bar">
            <div class="functional-side">
                <div class="controls-left">
                    <img class="icon-size" src="./assets/footer images/green button.png" alt="play button">
                    <img class="icon-size" src="./assets/footer images/left.png" alt="click left ">
                    <img class="icon-size" src="./assets/footer images/right.png" alt="click right">
                    <img class="icon-size" src="./assets/footer images/random.png" alt="random">
                    <img class="icon-size" src="./assets/footer images/return.png" alt="return">
                </div>
                <div class="progress-part">
                    <img src="./assets/footer images/Group 37.png" alt="music line">
                    <img src="./assets/footer images/volume.png" alt="volume">
                    <div class="album-box">
                        <img src="./assets/footer images/Rectangle 6.png" alt="album photo">
                        <div class="album-box-title">
                            <h3>Get Lucky</h3>
                            <p>Daft Punk</p>
                            <p>Random Access Memories</p>
                        </div>
                    </div>
                </div>
                <div class="controls-right">
                    <img src="./assets/footer images/like.png" alt="like button ">
                    <img src="./assets/footer images/add.png" alt=" add playlist">
                    <img src="./assets/footer images/Group 60.png" alt="lyrics">
                    <img src="./assets/footer images/Frame 4 (1).png" alt="device jam">
                    <img src="./assets/footer images/Frame 4 (2).png" alt="other">
                    <img src="./assets/footer images/Vector 43.png" alt="break line">
                    <img src="./assets/footer images/image 19.png" alt="Blue circle">
                    <img src="./assets/footer images/queue.png" alt="Queue">
                </div>

            </div>
        </div>
    </footer>
</body>

</html>
