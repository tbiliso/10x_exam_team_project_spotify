<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <header></header>
    <main class="main-content">
        <section class="main-hdr">
            <div>
                <button class="main-hdr__btn">
                    all
                </button>
                <button class="main-hdr__btn">
                    Music
                </button>
                <button class="main-hdr__btn">
                    Podcasts
                </button>
                <button class="main-hdr__btn">
                    Audiobooks
                </button>
            </div>

            <img src="./assets/icon/Layoutcontrol.png" alt="Layout control">

        </section>
        <h1 class="hidden"></h1>
        <section class="category">
            <div class="category__hdr">
                <h2 class="category__title">Made For You</h2>
                <div class="category__action">
                    <button class="category__btn">
                        <img src="./assets/icon/Arrow-Left.png" alt="Arrow Left">
                    </button>
                    <button class="category__btn">
                        <img src="./assets/icon/Arrow-Right.png" alt="Arrow Right">
                    </button>
                    <button class="category__btn">
                        <img src="./assets/icon/More.png" alt="More">
                    </button>
                </div>
            </div>
            <div class="category__card">
                <div class="category__cover">
                </div>
                <div class="category__title-group">
                    <h3 class="category__card-title">
                        Discover Weekly
                    </h3>
                    <span>50</span>
                </div>
                <p class="category__content">
                    Your weekly mixtape of fresh music.
                </p>
            </div>
        </section>
    </main>
    <footer></footer>
</body>

</html>
